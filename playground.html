    html, body { margin: 0; overflow-x: hidden; height: 100%; }

    /* Nav bar */
    .db-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--db-cream);
      border-bottom: 1px solid var(--db-sand);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      font-family: var(--db-font-ui);
      backdrop-filter: blur(8px);
    }
    .db-nav__brand {
      font-family: var(--db-font-heading);
      font-weight: 800;
      font-size: 1.125rem;
      color: var(--db-ink);
      text-decoration: none;
    }
    .db-nav__links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .db-nav__links a {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--db-charcoal);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--db-radius-2);
      transition: color var(--db-transition), background var(--db-transition);
    }
    .db-nav__links a:hover {
      color: var(--db-terracotta);
      background: color-mix(in srgb, var(--db-ink) 7%, transparent);
    }
    .db-nav__link--active {
      color: var(--db-terracotta) !important;
      font-weight: 600 !important;
      background: color-mix(in srgb, var(--db-terracotta) 15%, transparent) !important;
    }
    .db-nav__github {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--db-charcoal);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--db-radius-2);
      border: 1px solid var(--db-sand);
      transition: border-color var(--db-transition);

      .db-nav { padding: 0 12px; }

      .db-nav__links a { font-size: 0.75rem; padding: 4px 8px; }
      .db-nav__github span { display: none; }

    /* Playground layout */
    .pg-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px);
    }
    .pg-grid {
      display: grid;
      grid-template-columns: 1fr 6px 1fr 6px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pg-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .pg-panel__toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--db-sand);
      background: var(--db-cream);
      font-family: var(--db-font-ui);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--db-charcoal);
      flex-shrink: 0;
    }
    .pg-panel__toolbar-title {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pg-panel__body {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }

    /* Dividers */
    .pg-divider {
      background: var(--db-sand);
      cursor: col-resize;
      position: relative;
      z-index: 10;
      transition: background 0.15s;
    }
    .pg-divider:hover,
    .pg-divider--dragging {
      background: var(--db-terracotta);
    }
    .pg-divider::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -4px; right: -4px;
    }

    /* Prompt panel */
    .pg-settings { margin-bottom: 12px; }
    .pg-templates {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .pg-prompt-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pg-prompt-area .db-textarea {
      flex: 1;
      min-height: 120px;
      resize: none;
      font-family: var(--db-font-ui);
      font-size: 0.8125rem;

    .pg-json-error {

<script>
// ============================================================
//  DAUB Playground — json-render Generative UI
// ============================================================
//
//  Security note: All dynamic content from AI/user input is
//  sanitized via the esc() function which uses textContent-based
//  escaping before insertion into component templates.
//
(function() {
'use strict';

// ---- DOM refs ----
var $provider   = document.getElementById('pg-provider');
var $model      = document.getElementById('pg-model');
var $apikey     = document.getElementById('pg-apikey');
var $prompt     = document.getElementById('pg-prompt');
var $json       = document.getElementById('pg-json');
var $preview    = document.getElementById('pg-preview');
var $generate   = document.getElementById('pg-generate');
var $render     = document.getElementById('pg-render');
var $copyJson   = document.getElementById('pg-copy-json');
var $formatJson = document.getElementById('pg-format-json');
var $copyHtml   = document.getElementById('pg-copy-html');
var $status     = document.getElementById('pg-status');
var $jsonError  = document.querySelector('.pg-json-error');
var $jsonErrMsg = document.getElementById('pg-json-error-msg');

// ---- Model options per provider ----
var MODELS = {
  openai: [
    { value: 'gpt-4o-mini', label: 'GPT-4o Mini' },
    { value: 'gpt-4.1', label: 'GPT-4.1' },
    { value: 'o4-mini', label: 'o4-mini' },
    { value: 'gpt-5-nano', label: 'GPT-5 Nano' },
    { value: 'gpt-5-mini', label: 'GPT-5 Mini' }
  ],
  anthropic: [
    { value: 'claude-haiku-4-5-20251001', label: 'Claude Haiku 4.5' },
    { value: 'claude-sonnet-4-6', label: 'Claude Sonnet 4.6' },
    { value: 'claude-opus-4-6', label: 'Claude Opus 4.6' }
  ],
  openrouter: [
    { value: 'openai/gpt-4o-mini', label: 'GPT-4o Mini' },
    { value: 'openai/gpt-4.1', label: 'GPT-4.1' },
    { value: 'openai/o4-mini', label: 'o4-mini' },
    { value: 'anthropic/claude-sonnet-4.6', label: 'Claude Sonnet 4.6' },
    { value: 'anthropic/claude-haiku-4.5', label: 'Claude Haiku 4.5' },
    { value: 'google/gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
    { value: 'deepseek/deepseek-r1', label: 'DeepSeek R1' }
  ]
};

// ---- Persist settings ----
function loadSettings() {
  try {
    var p = localStorage.getItem('pg-provider') || 'openai';
    $provider.value = p;
    updateModelOptions(p);
    var m = localStorage.getItem('pg-model');
    if (m) $model.value = m;
    var keys = JSON.parse(localStorage.getItem('pg-apikeys') || '{}');
    if (keys[p]) $apikey.value = keys[p];
  } catch(e) {}
}

function saveSettings() {
  try {
    localStorage.setItem('pg-provider', $provider.value);
    localStorage.setItem('pg-model', $model.value);
    var keys = JSON.parse(localStorage.getItem('pg-apikeys') || '{}');
    keys[$provider.value] = $apikey.value;
    localStorage.setItem('pg-apikeys', JSON.stringify(keys));
  } catch(e) {}
}

function updateModelOptions(provider) {
  var models = MODELS[provider] || MODELS.openai;
  $model.textContent = '';
  models.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m.value;
    opt.textContent = m.label;
    $model.appendChild(opt);
  });
}

$provider.addEventListener('change', function() {
  updateModelOptions(this.value);
  try {
    var keys = JSON.parse(localStorage.getItem('pg-apikeys') || '{}');
    $apikey.value = keys[this.value] || '';
  } catch(e) {}
  saveSettings();
});
$model.addEventListener('change', saveSettings);
$apikey.addEventListener('change', saveSettings);

// ---- Templates ----
var TEMPLATES = {
  dashboard: 'Create a dashboard with:\n- A layout with 3 stat cards in a row: "Total Revenue" ($45,231, +20.1% up), "Active Users" (2,350, +180 up), "Pending Orders" (12, -2 down)\n- Below that, a chart card titled "Monthly Revenue" containing a bar chart with 6 bars (Mon-Sat)\n- Below that, a data table titled "Recent Transactions" with columns: Customer, Amount, Status, Date \u2014 with 5 rows of sample data',

  login: 'Create a login form with:\n- A card centered on the page\n- Card title "Sign In" with description "Enter your credentials to continue"\n- Email field with label and placeholder\n- Password field with label and placeholder\n- A checkbox "Remember me"\n- A primary button "Sign In" full width\n- A separator with label "Or continue with"\n- A button group with "Google" and "GitHub" secondary buttons\n- Below the card, a text "Don\'t have an account? Sign up"',

  settings: 'Create a settings page with:\n- A layout with heading "Settings" (h2)\n- A tabs component with 3 tabs: "General", "Notifications", "Security"\n- Under General tab: a field for "Display Name", a field for "Email", a textarea for "Bio", and a switch for "Dark Mode"\n- A separator\n- A button group with "Cancel" (secondary) and "Save Changes" (primary) buttons',

  profile: 'Create a profile card with:\n- A card with a large avatar (initials "JD"), heading "Jane Doe", and description "Senior Product Designer"\n- A list with 3 items: "Location: San Francisco", "Joined: March 2024", "Projects: 24"\n- A badge "Pro" (new variant)\n- Card footer with "Message" primary button and "Follow" secondary button',

  datatable: 'Create a data management view with:\n- A layout with heading "Team Members" (h2)\n- A search input with placeholder "Search members..."\n- A data table with columns: Name, Role, Department, Status, Actions\n- 6 rows of data with varied names, roles (Engineer, Designer, PM, etc.), departments, and status badges (Active, On Leave, Remote)\n- Pagination showing "Page 1 of 3" with 6 items per page'
};

}\n- Tooltip: { text: string, position: "top"|"bottom"|"left"|"right" }\n\nOverlays:\n- Modal: { id: string, title: string }\n- AlertDialog: { id: string, title: string, description: string }\n- Sheet: { id: string, position: "right"|"left"|"top"|"bottom" }\n- Drawer: { id: string }\n- Popover: { position: "top"|"bottom"|"left"|"right" }\n- HoverCard: {}\n- DropdownMenu: { items: [{label, icon, separator, groupLabel}] }\n- ContextMenu: { items: [{label, icon, separator}] }\n- CommandPalette: { id: string, placeholder: string, groups: [{label, items: [{label, icon, shortcut}]}] }\n\nLayout Utilities:\n- Accordion: { items: [{title, content}], multi: bool }\n- Collapsible: { label: string }\n- Resizable: { direction: "horizontal"|"vertical" }\n- DatePicker: { label: string, placeholder: string, selected: string }\n\nDashboard:\n- StatCard: { label: string, value: string, trend: "up"|"down", trendValue: string }\n- ChartCard: { title: string }\n\nGUIDELINES:\n- Use Layout as the root with direction:"vertical" for page-level layouts\n- Use Layout with direction:"horizontal" and columns for grid arrangements\n- Wrap related content in Card components\n- Use StatCard for KPI metrics\n- Use real-looking sample data (names, numbers, dates)\n- Keep element IDs descriptive and unique';

function callOpenAI(prompt) {

    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + $apikey.value.trim()
    },
    body: JSON.stringify({
      model: $model.value,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: prompt }
      ],
      temperature: 0.7,
      max_tokens: 4096
    })
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return {}; }).then(function(err) {
        throw new Error((err.error && err.error.message) || 'HTTP ' + res.status);
      });
    }
    return res.json();
  }).then(function(data) {
    return data.choices[0].message.content;
  });

function generate() {
  var prompt = $prompt.value.trim();
  if (!prompt) return;

  var key = $apikey.value.trim();
  if (!key) {
    showJsonError('Please add your API key in Settings above.');
    return;
  }

  saveSettings();
  setLoading(true);
  $status.textContent = 'Generating...';
  hideJsonError();

  var provider = $provider.value;
  var apiCall = provider === 'anthropic' ? callAnthropic(prompt) : provider === 'openrouter' ? callOpenRouter(prompt) : callOpenAI(prompt);

  apiCall.then(function(raw) {
    // Strip markdown fences if present
    raw = raw.replace(/^```(?:json)?\s*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
    var spec = JSON.parse(raw);
    $json.value = JSON.stringify(spec, null, 2);
    $status.textContent = 'Generated successfully';
    renderSpec(spec);
  }).catch(function(err) {
    $status.textContent = 'Error';
    showJsonError(err.message);
  }).finally(function() {
    setLoading(false);
  });
}

function setLoading(on) {
  if (on) {
    $generate.classList.add('db-btn--loading');
    $generate.disabled = true;
  } else {
    $generate.classList.remove('db-btn--loading');
    $generate.disabled = false;
  }
}

function showJsonError(msg) {
  $jsonErrMsg.textContent = msg;
  $jsonError.style.display = 'block';
}
function hideJsonError() {
  $jsonError.style.display = 'none';
}

// ---- Render from JSON editor ----
function renderFromEditor() {
  hideJsonError();
  try {
    var spec = JSON.parse($json.value);
    renderSpec(spec);
    $status.textContent = 'Rendered';
  } catch (err) {
    showJsonError(err.message);
  }
}

// ============================================================
//  RENDERER — json-render spec to DAUB HTML
// ============================================================
var MAX_DEPTH = 20;

function renderSpec(spec) {
  if (!spec || !spec.root || !spec.elements) {
    showJsonError('Spec must have "root" and "elements"');
    return;
  }
  $preview.textContent = '';
  var el = renderElement(spec.elements, spec.root, 0);
  if (el) $preview.appendChild(el);

  // Re-init DAUB behaviors on new content
  if (window.DAUB) {
    DAUB.init($preview);
    if (DAUB.fixNestedRadius) DAUB.fixNestedRadius($preview);
  }
  if (window.lucide) lucide.createIcons({ nodes: $preview.querySelectorAll('[data-lucide]') });
}

function renderElement(elements, id, depth) {
  if (depth > MAX_DEPTH) return document.createTextNode('[max depth]');
  var def = elements[id];
  if (!def) return document.createTextNode('[missing: ' + id + ']');

  var render = RENDERERS[def.type];
  if (!render) {
    var el = document.createElement('div');
    el.className = 'db-alert db-alert--warning';
    var content = document.createElement('div');
    content.className = 'db-alert__content';
    var title = document.createElement('div');
    title.className = 'db-alert__title';
    title.textContent = 'Unknown: ' + def.type;
    content.appendChild(title);
    el.appendChild(content);
    return el;
  }

  return render(def.props || {}, def.children || [], elements, depth);
}

function renderChildren(elements, childIds, depth) {
  var frag = document.createDocumentFragment();
  (childIds || []).forEach(function(id) {
    var el = renderElement(elements, id, depth + 1);
    if (el) frag.appendChild(el);
  });
  return frag;
}

// Safe HTML-entity escaping via textContent
function esc(s) {
  if (s == null) return '';
  var d = document.createElement('span');
  d.textContent = String(s);
  return d.innerHTML;
}

function iconHtml(name, size) {
  if (!name) return '';
  return '<i data-lucide="' + esc(name) + '" style="width:' + (size||16) + 'px;height:' + (size||16) + 'px;"></i>';
}

// Helper: create element and set safe text/attributes
function mkEl(tag, cls, text) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text != null) el.textContent = text;
  return el;
}

// ---- Component Renderers (67 types) ----
var RENDERERS = {};

// -- Layout --
RENDERERS.Layout = function(p, ch, els, d) {
  var el = document.createElement('div');
  if (p.container) {
    el.className = 'db-container' + (p.container === 'wide' ? ' db-container--wide' : p.container === 'narrow' ? ' db-container--narrow' : '');
  }
  if (p.columns) {
    el.classList.add('db-grid', 'db-grid--' + p.columns);
    if (p.gap) el.classList.add('db-gap-' + Math.round(p.gap / 4));
  } else if (p.direction === 'horizontal') {
    el.style.display = 'flex';
    el.style.flexDirection = 'row';
    el.style.gap = (p.gap || 16) + 'px';
    el.style.flexWrap = 'wrap';
    el.style.alignItems = 'flex-start';
  } else {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.gap = (p.gap || 16) + 'px';
  }
  el.appendChild(renderChildren(els, ch, d));
  return el;
};

// -- Surface --
RENDERERS.Surface = function(p, ch, els, d) {
  var el = document.createElement('div');
  el.className = p.variant ? 'db-surface--' + p.variant : 'db-surface';
  el.style.padding = '16px';
  el.appendChild(renderChildren(els, ch, d));
  return el;
};

// -- Text --
RENDERERS.Text = function(p) {
  var tag = ['h1','h2','h3','h4','p','span'].indexOf(p.tag) >= 0 ? p.tag : 'p';
  var el = document.createElement(tag);
  var classMap = { h1:'db-h1', h2:'db-h2', h3:'db-h3', h4:'db-h4', p:'db-body', span:'' };
  el.className = (classMap[tag] || '') + (p.class ? ' ' + p.class : '');
  el.textContent = p.content || '';
  return el;
};

// -- Prose --
RENDERERS.Prose = function(p) {
  var el = document.createElement('div');
  el.className = 'db-prose' + (p.size ? ' db-prose--' + p.size : '');
  el.textContent = p.content || '';
  return el;
};

// -- Separator --
RENDERERS.Separator = function(p) {
  if (p.label) {
    var el = document.createElement('div');
    el.className = 'db-separator__label';
    el.textContent = p.label;
    return el;
  }
  var hr = document.createElement('hr');
  hr.className = 'db-separator' + (p.dashed ? ' db-separator--dashed' : '') + (p.vertical ? ' db-separator--vertical' : '');
  return hr;
};

// -- Button --
RENDERERS.Button = function(p) {
  var el = document.createElement('button');
  var cls = 'db-btn';
  if (p.variant) cls += ' db-btn--' + p.variant;
  if (p.size) cls += ' db-btn--' + p.size;
  if (p.loading) { cls += ' db-btn--loading'; el.disabled = true; }
  el.className = cls;
  if (p.icon) {
    var ico = document.createElement('i');
    ico.setAttribute('data-lucide', p.icon);
    ico.style.width = '16px';
    ico.style.height = '16px';
    el.appendChild(ico);
    el.appendChild(document.createTextNode(' '));
  }
  el.appendChild(document.createTextNode(p.label || ''));
  return el;
};

// -- ButtonGroup --
RENDERERS.ButtonGroup = function(p, ch, els, d) {
  var el = mkEl('div', 'db-btn-group');
  el.appendChild(renderChildren(els, ch, d));
  return el;
};

// -- Field --
RENDERERS.Field = function(p) {
  var el = mkEl('div', 'db-field' + (p.error ? ' db-field--error' : ''));
  if (p.label) {
    var lbl = mkEl('label', 'db-field__label', p.label);
    el.appendChild(lbl);
  }
  var inp = document.createElement('input');
  inp.className = 'db-field__input';
  inp.type = p.type || 'text';
  inp.placeholder = p.placeholder || '';
  el.appendChild(inp);
  if (p.helper) {
    var help = mkEl('span', 'db-field__helper', p.helper);
    el.appendChild(help);
  }
  return el;
};

// -- Input --
RENDERERS.Input = function(p) {
  var el = document.createElement('input');
  el.className = 'db-input' + (p.size ? ' db-input--' + p.size : '') + (p.error ? ' db-input--error' : '');
  el.type = p.type || 'text';
  el.placeholder = p.placeholder || '';
  return el;
};

// -- InputGroup --
RENDERERS.InputGroup = function(p, ch, els, d) {
  var el = mkEl('div', 'db-input-group');
  if (p.addonBefore) {
    el.appendChild(mkEl('span', 'db-input-group__addon', p.addonBefore));
  }
  el.appendChild(renderChildren(els, ch, d));
  if (p.addonAfter) {
    el.appendChild(mkEl('span', 'db-input-group__addon', p.addonAfter));
  }
  return el;
};

// -- InputIcon --
RENDERERS.InputIcon = function(p, ch, els, d) {
  var el = mkEl('div', 'db-input-icon' + (p.right ? ' db-input-icon--right' : ''));
  if (p.icon) {
    var ico = document.createElement('i');
    ico.setAttribute('data-lucide', p.icon);
    ico.style.width = '16px';
    ico.style.height = '16px';
    el.appendChild(ico);
  }
  el.appendChild(renderChildren(els, ch, d));
  return el;
};

// -- Search --
RENDERERS.Search = function(p) {
  var el = mkEl('div', 'db-input-icon');
  var ico = document.createElement('i');
  ico.setAttribute('data-lucide', 'search');
  ico.style.width = '16px';
  ico.style.height = '16px';
  el.appendChild(ico);
  var inp = document.createElement('input');
  inp.className = 'db-input';
  inp.type = 'search';
  inp.placeholder = p.placeholder || 'Search...';
  el.appendChild(inp);
  return el;
};

// -- Textarea --
RENDERERS.Textarea = function(p) {
  var el = document.createElement('textarea');
  el.className = 'db-textarea' + (p.error ? ' db-textarea--error' : '');
  el.placeholder = p.placeholder || '';
  if (p.rows) el.rows = p.rows;
  return el;
};

// -- Checkbox --
RENDERERS.Checkbox = function(p) {
  var el = mkEl('label', 'db-checkbox');
  var inp = document.createElement('input');
  inp.className = 'db-checkbox__input';
  inp.type = 'checkbox';
  if (p.checked) inp.checked = true;
  el.appendChild(inp);
  var box = document.createElement('span');
  box.className = 'db-checkbox__box';
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  poly.setAttribute('points', '20 6 9 17 4 12');
  svg.appendChild(poly);
  box.appendChild(svg);
  el.appendChild(box);
  el.appendChild(document.createTextNode(' ' + (p.label || '')));
  return el;
};

// -- RadioGroup --
RENDERERS.RadioGroup = function(p) {
  var el = mkEl('div', 'db-radio-group');
  var name = 'rg-' + Math.random().toString(36).slice(2,8);
  (p.options || []).forEach(function(opt) {
    var lbl = mkEl('label', 'db-radio');
    var inp = document.createElement('input');
    inp.className = 'db-radio__input';
    inp.type = 'radio';
    inp.name = name;
    inp.value = opt.value || '';
    if (opt.value === p.selected) inp.checked = true;
    lbl.appendChild(inp);
    lbl.appendChild(mkEl('span', 'db-radio__circle'));
    lbl.appendChild(document.createTextNode(' ' + (opt.label || '')));
    el.appendChild(lbl);
  });
  return el;
};

// -- Switch --
RENDERERS.Switch = function(p) {
  var el = mkEl('div', 'db-switch');
  el.setAttribute('role', 'switch');
  el.tabIndex = 0;
  el.setAttribute('aria-checked', p.checked ? 'true' : 'false');
  var track = mkEl('span', 'db-switch__track');
  track.appendChild(mkEl('span', 'db-switch__thumb'));
  el.appendChild(track);
  el.appendChild(document.createTextNode(' ' + (p.label || '')));
  return el;
};

// -- Slider --
RENDERERS.Slider = function(p) {
  var el = mkEl('div', 'db-slider');
  var lbl = mkEl('div', 'db-slider__label');
  lbl.appendChild(mkEl('span', null, p.label || ''));
  lbl.appendChild(mkEl('span', 'db-slider__value', String(p.value != null ? p.value : 50)));
  el.appendChild(lbl);
  var inp = document.createElement('input');
  inp.className = 'db-slider__input';
  inp.type = 'range';
  inp.min = p.min != null ? p.min : 0;
  inp.max = p.max != null ? p.max : 100;
  inp.value = p.value != null ? p.value : 50;
  if (p.step) inp.step = p.step;
  el.appendChild(inp);
  return el;
};

// -- Toggle --
RENDERERS.Toggle = function(p) {
  var el = document.createElement('button');
  el.className = 'db-toggle' + (p.size === 'sm' ? ' db-toggle--sm' : '');
  el.setAttribute('aria-pressed', p.pressed ? 'true' : 'false');
  el.textContent = p.label || '';
  return el;
};

// -- ToggleGroup --
RENDERERS.ToggleGroup = function(p) {
  var el = mkEl('div', 'db-toggle-group');
  (p.options || []).forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'db-toggle';
    btn.setAttribute('aria-pressed', opt.value === p.selected ? 'true' : 'false');
    btn.textContent = opt.label || '';
    el.appendChild(btn);
  });
  return el;
};

// -- Select --
RENDERERS.Select = function(p) {
  var el = mkEl('div', 'db-select');
  if (p.label) el.appendChild(mkEl('label', 'db-label', p.label));
  var sel = document.createElement('select');
  sel.className = 'db-select__input';
  (p.options || []).forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o.value || '';
    opt.textContent = o.label || '';
    if (o.value === p.selected) opt.selected = true;
    sel.appendChild(opt);
  });
  el.appendChild(sel);
  return el;
};

// -- CustomSelect --
RENDERERS.CustomSelect = function(p) {
  var el = mkEl('div', 'db-custom-select');
  var trigger = document.createElement('button');
  trigger.className = 'db-custom-select__trigger';
  trigger.type = 'button';
  trigger.appendChild(mkEl('span', 'db-custom-select__placeholder', p.placeholder || 'Select...'));
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'db-custom-select__icon');
  svg.setAttribute('viewBox', '0 0 24 24');
  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'm6 9 6 6 6-6');
  svg.appendChild(path);
  trigger.appendChild(svg);
  el.appendChild(trigger);
  var dd = mkEl('div', 'db-custom-select__dropdown');
  if (p.searchable) {
    var searchDiv = mkEl('div', 'db-custom-select__search');
    var searchInp = document.createElement('input');
    searchInp.type = 'text';
    searchInp.placeholder = 'Search...';
    searchDiv.appendChild(searchInp);
    dd.appendChild(searchDiv);
  }
  (p.options || []).forEach(function(o) {
    dd.appendChild(mkEl('div', 'db-custom-select__option', o.label || ''));
  });
  el.appendChild(dd);
  return el;
};

// -- Kbd --
RENDERERS.Kbd = function(p) {
  var el = document.createElement('span');
  (p.keys || []).forEach(function(k, i) {
    if (i > 0) el.appendChild(document.createTextNode(' + '));
    el.appendChild(mkEl('kbd', 'db-kbd', k));
  });
  return el;
};

// -- Label --
RENDERERS.Label = function(p) {
  var el = mkEl('label', 'db-label' + (p.required ? ' db-label--required' : '') + (p.optional ? ' db-label--optional' : ''), p.text || '');
  return el;
};

// -- Spinner --
RENDERERS.Spinner = function(p) {
  return mkEl('span', 'db-spinner' + (p.size ? ' db-spinner--' + p.size : ''));
};

// -- InputOTP --
RENDERERS.InputOTP = function(p) {
  var el = mkEl('div', 'db-otp');
  var len = p.length || 6;
  var half = Math.ceil(len / 2);
  for (var i = 0; i < len; i++) {
    if (p.separator && i === half) {
      el.appendChild(mkEl('span', 'db-otp__separator', '-'));
    }
    var inp = document.createElement('input');
    inp.className = 'db-otp__input';
    inp.type = 'text';
    inp.inputMode = 'numeric';
    inp.maxLength = 1;
    el.appendChild(inp);
  }
  return el;
};

// -- Tabs --
RENDERERS.Tabs = function(p, ch, els, d) {
  var el = mkEl('div', 'db-tabs');
  var list = mkEl('div', 'db-tabs__list');
  list.setAttribute('role', 'tablist');
  var tabs = p.tabs || [];
  tabs.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'db-tabs__tab';
    if (t.id === p.active) btn.setAttribute('aria-selected', 'true');
    btn.textContent = t.label || '';
    list.appendChild(btn);
  });
  el.appendChild(list);
  if (ch.length) {
    ch.forEach(function(cid, i) {
      var panel = mkEl('div', 'db-tabs__panel');
      if (i > 0) panel.hidden = true;
      panel.appendChild(renderElement(els, cid, d + 1));
      el.appendChild(panel);
    });
  } else {
    tabs.forEach(function(t, i) {
      var panel = mkEl('div', 'db-tabs__panel');
      if (i > 0) panel.hidden = true;
      panel.appendChild(mkEl('p', 'db-body', (t.label || '') + ' content'));
      el.appendChild(panel);
    });
  }
  return el;
};

// -- Breadcrumbs --
RENDERERS.Breadcrumbs = function(p) {
  var el = document.createElement('nav');
  el.className = 'db-breadcrumbs';
  el.setAttribute('aria-label', 'Breadcrumb');
  var ol = document.createElement('ol');
  var items = p.items || [];
  items.forEach(function(item, i) {
    var li = document.createElement('li');
    if (i === items.length - 1) {
      li.setAttribute('aria-current', 'page');
      li.textContent = item.label || '';
    } else {
      var a = document.createElement('a');
      a.href = item.href || '#';
      a.textContent = item.label || '';
      li.appendChild(a);
    }
    ol.appendChild(li);
  });
  el.appendChild(ol);
  return el;
};

// -- Pagination --
RENDERERS.Pagination = function(p) {
  var el = document.createElement('nav');
  el.className = 'db-pagination';
  el.setAttribute('aria-label', 'Pagination');
  var total = Math.ceil((p.total || 1) / (p.perPage || 10));
  var cur = p.current || 1;
  var prev = document.createElement('button');
  prev.className = 'db-pagination__btn';
  prev.textContent = '\u00AB';
  if (cur <= 1) prev.disabled = true;
  el.appendChild(prev);
  for (var i = 1; i <= Math.min(total, 5); i++) {
    var btn = document.createElement('button');
    btn.className = 'db-pagination__btn';
    btn.textContent = String(i);
    if (i === cur) btn.setAttribute('aria-current', 'page');
    el.appendChild(btn);
  }
  if (total > 5) {
    el.appendChild(mkEl('span', 'db-pagination__ellipsis', '...'));
    var last = document.createElement('button');
    last.className = 'db-pagination__btn';
    last.textContent = String(total);
    el.appendChild(last);
  }
  var next = document.createElement('button');
  next.className = 'db-pagination__btn';
  next.textContent = '\u00BB';
  if (cur >= total) next.disabled = true;
  el.appendChild(next);
  return el;
};

// -- Stepper --
RENDERERS.Stepper = function(p) {
  var el = mkEl('div', 'db-stepper');
  (p.steps || []).forEach(function(s, i) {
    var step = mkEl('div', 'db-stepper__step db-stepper__step--' + (s.status || 'pending'));
    step.appendChild(mkEl('div', 'db-stepper__indicator', String(i + 1)));
    step.appendChild(mkEl('div', 'db-stepper__label', s.label || ''));
    el.appendChild(step);
  });
  return el;
};

// -- NavMenu --
RENDERERS.NavMenu = function(p) {

RENDERERS.Menubar = function(p) {

// -- Sidebar --
RENDERERS.Sidebar = function(p) {

  el.style.position = 'relative';
  el.style.height = 'auto';
  (p.sections || []).forEach(function(sec) {
    var section = mkEl('div', 'db-sidebar__section');
    if (sec.title) section.appendChild(mkEl('div', 'db-sidebar__label', sec.title));
    (sec.items || []).forEach(function(item) {
      var a = document.createElement('a');
      a.className = 'db-sidebar__item' + (item.active ? ' db-sidebar__item--active' : '');

      a.href = item.href || '#';
      if (item.icon) {
        var ico = document.createElement('i');

      section.appendChild(a);

    }

// -- Card --
RENDERERS.Card = function(p, ch, els, d) {
  var el = mkEl('div', 'db-card' + (p.media ? ' db-card--media' : ''));
  if (p.media) {
    var media = mkEl('div', 'db-card__media');
    var img = document.createElement('img');
    img.src = p.media;

  }

// -- Table --
RENDERERS.Table = function(p) {
  var el = document.createElement('table');
  el.className = 'db-table';
  var cols = p.columns || [];
  var rows = p.rows || [];
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  cols.forEach(function(c) {
    var th = document.createElement('th');
    if (p.sortable) th.setAttribute('data-db-sort', '');
    if (c.numeric) th.className = 'db-numeric';
    th.textContent = c.label || '';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  el.appendChild(thead);
  var tbody = document.createElement('tbody');
  rows.forEach(function(r) {
    var tr = document.createElement('tr');
    cols.forEach(function(c) {
      var td = document.createElement('td');
      if (c.numeric) td.className = 'db-numeric';
      td.textContent = r[c.key] || '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  el.appendChild(tbody);
  return el;
};

// -- DataTable --
RENDERERS.DataTable = function(p) {
  var el = document.createElement('table');
  el.className = 'db-data-table';
  var cols = p.columns || [];
  var rows = p.rows || [];
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  if (p.selectable) {
    var thChk = document.createElement('th');
    var chk = document.createElement('input');
    chk.className = 'db-data-table__check';
    chk.type = 'checkbox';
    thChk.appendChild(chk);
    headRow.appendChild(thChk);
  }
  cols.forEach(function(c) {
    var th = document.createElement('th');
    th.setAttribute('data-sortable', '');
    th.textContent = c.label || '';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  el.appendChild(thead);
  var tbody = document.createElement('tbody');
  rows.forEach(function(r) {
    var tr = document.createElement('tr');
    if (p.selectable) {
      var tdChk = document.createElement('td');
      var chk2 = document.createElement('input');
      chk2.className = 'db-data-table__check';
      chk2.type = 'checkbox';
      tdChk.appendChild(chk2);
      tr.appendChild(tdChk);
    }
    cols.forEach(function(c) {
      var td = document.createElement('td');
      var val = r[c.key] || '';
      // Auto-detect status badges
      if (/^(active|completed|shipped|approved|paid)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--new', val));
      } else if (/^(pending|review|processing|in progress)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--updated', val));
      } else if (/^(error|failed|rejected|cancelled|canceled)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--error', val));
      } else if (/^(on leave|away|inactive|paused|remote)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--warning', val));
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  el.appendChild(tbody);
  return el;
};

// -- List --
RENDERERS.List = function(p) {
  var el = mkEl('div', 'db-list');
  (p.items || []).forEach(function(item) {
    var li = mkEl('div', 'db-list__item');
    if (item.icon) {
      var iconWrap = mkEl('div', 'db-list__icon');
      var ico = document.createElement('i');
      ico.setAttribute('data-lucide', item.icon);
      ico.style.width = '16px';
      ico.style.height = '16px';
      iconWrap.appendChild(ico);
      li.appendChild(iconWrap);
    }
    var content = mkEl('div', 'db-list__content');
    content.appendChild(mkEl('div', 'db-list__title', item.title || ''));
    if (item.secondary) content.appendChild(mkEl('div', 'db-list__secondary', item.secondary));
    li.appendChild(content);
    el.appendChild(li);
  });
  return el;
};

// -- Badge --
RENDERERS.Badge = function(p) {
  return mkEl('span', 'db-badge' + (p.variant ? ' db-badge--' + p.variant : ''), p.text || '');
};

// -- Avatar --
RENDERERS.Avatar = function(p) {
  var el = mkEl('div', 'db-avatar' + (p.size ? ' db-avatar--' + p.size : ' db-avatar--md'));
  if (p.src) {
    var img = document.createElement('img');
    img.src = p.src;
    img.alt = '';
    el.appendChild(img);
  } else {
    el.textContent = p.initials || '?';
  }
  return el;
};

// -- AvatarGroup --
RENDERERS.AvatarGroup = function(p) {
  var el = mkEl('div', 'db-avatar-group');
  var avatars = p.avatars || [];
  var max = p.max || avatars.length;
  avatars.slice(0, max).forEach(function(a) {
    var av = mkEl('div', 'db-avatar db-avatar--md');
    if (a.src) {
      var img = document.createElement('img');
      img.src = a.src;
      img.alt = '';
      av.appendChild(img);
    } else {
      av.textContent = a.initials || '?';
    }
    el.appendChild(av);
  });
  if (avatars.length > max) {
    el.appendChild(mkEl('span', 'db-avatar-group__overflow', '+' + (avatars.length - max)));
  }
  return el;
};

// -- Calendar --
RENDERERS.Calendar = function(p) {
  var el = mkEl('div', 'db-calendar');
  var today = parseInt(p.today) || new Date().getDate();
  var sel = parseInt(p.selected) || 15;
  var hdr = mkEl('div', 'db-calendar__header');
  var prevBtn = document.createElement('button');
  prevBtn.className = 'db-calendar__nav';
  prevBtn.textContent = '\u2039';
  hdr.appendChild(prevBtn);
  hdr.appendChild(mkEl('span', 'db-calendar__title', 'March 2026'));
  var nextBtn = document.createElement('button');
  nextBtn.className = 'db-calendar__nav';
  nextBtn.textContent = '\u203A';
  hdr.appendChild(nextBtn);
  el.appendChild(hdr);
  var grid = mkEl('div', 'db-calendar__grid');
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d) {
    grid.appendChild(mkEl('span', 'db-calendar__day-label', d));
  });
  for (var i = 1; i <= 31; i++) {
    var day = document.createElement('button');
    day.className = 'db-calendar__day';
    if (i === today) day.classList.add('db-calendar__day--today');
    if (i === sel) day.classList.add('db-calendar__day--selected');
    day.textContent = String(i);
    grid.appendChild(day);
  }
  el.appendChild(grid);
  return el;
};

// -- Chart --
RENDERERS.Chart = function(p) {
  var wrap = document.createElement('div');
  var bars = p.bars || [];
  var maxVal = Math.max.apply(null, bars.map(function(b) { return b.max || b.value || 100; }));
  if (maxVal <= 0) maxVal = 100;
  var chart = mkEl('div', 'db-chart');
  bars.forEach(function(b) {
    var bar = mkEl('div', 'db-chart__bar');
    bar.style.height = Math.round(((b.value || 0) / maxVal) * 100) + '%';
    bar.title = (b.label || '') + ': ' + (b.value || 0);
    chart.appendChild(bar);
  });
  wrap.appendChild(chart);
  var labels = mkEl('div', 'db-chart__labels');
  bars.forEach(function(b) {
    labels.appendChild(mkEl('span', null, b.label || ''));
  });
  wrap.appendChild(labels);
  return wrap;
};

// -- Skeleton --
RENDERERS.Skeleton = function(p) {

};

// -- AlertDialog --
RENDERERS.AlertDialog = function(p, ch, els, d) {
  var el = mkEl('div', 'db-alert-dialog');
  el.id = p.id || 'alert-' + Math.random().toString(36).slice(2,8);
  el.appendChild(mkEl('div', 'db-alert-dialog__overlay'));
  var panel = mkEl('div', 'db-alert-dialog__panel');
  panel.appendChild(mkEl('h3', 'db-alert-dialog__title', p.title || 'Confirm'));
  panel.appendChild(mkEl('p', 'db-alert-dialog__desc', p.description || ''));
  var actions = mkEl('div', 'db-alert-dialog__actions');
  if (ch.length) {
    actions.appendChild(renderChildren(els, ch, d));
  } else {
    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'db-btn db-btn--secondary';
    cancelBtn.setAttribute('data-action', 'cancel');
    cancelBtn.textContent = 'Cancel';
    actions.appendChild(cancelBtn);

  panel.appendChild(actions);

  return el;
};

// -- DropdownMenu --
RENDERERS.DropdownMenu = function(p, ch, els, d) {
  var el = mkEl('div', 'db-dropdown');
  if (ch.length) {
    el.appendChild(renderElement(els, ch[0], d + 1));
  } else {
    var trigger = document.createElement('button');
    trigger.className = 'db-btn db-dropdown__trigger';
    trigger.textContent = 'Options';
    el.appendChild(trigger);
  }
  var content = mkEl('div', 'db-dropdown__content');
  (p.items || []).forEach(function(item) {
    if (item.separator) {
      content.appendChild(mkEl('hr', 'db-dropdown__separator'));
    } else if (item.groupLabel) {
      content.appendChild(mkEl('div', 'db-dropdown__label', item.groupLabel));
    } else {
      var btn = document.createElement('button');
      btn.className = 'db-dropdown__item';
      if (item.icon) {
        var ico = document.createElement('i');
        ico.setAttribute('data-lucide', item.icon);
        ico.style.width = '16px';
        ico.style.height = '16px';
        btn.appendChild(ico);
        btn.appendChild(document.createTextNode(' '));
      }
      btn.appendChild(document.createTextNode(item.label || ''));
      content.appendChild(btn);
    }
  });
  el.appendChild(content);
  return el;
};

RENDERERS.ContextMenu = function(p, ch, els, d) {

  var target = document.createElement('div');
  target.setAttribute('data-context-menu', id);
  target.style.padding = '16px';
  target.style.border = '1px dashed var(--db-sand)';
  target.style.borderRadius = 'var(--db-radius-2)';
  target.style.textAlign = 'center';
  target.style.color = 'var(--db-warm-gray)';
  target.style.fontFamily = 'var(--db-font-ui)';
  target.style.fontSize = '0.8125rem';
  if (ch.length) {
    target.appendChild(renderChildren(els, ch, d));
  } else {
    target.textContent = 'Right-click here';
  }
  wrapper.appendChild(target);
  var menu = mkEl('div', 'db-context-menu');
  menu.id = id;
  (p.items || []).forEach(function(item) {
    if (item.separator) {
      menu.appendChild(mkEl('hr', 'db-context-menu__separator'));
    } else {
      var btn = document.createElement('button');
      btn.className = 'db-context-menu__item';
      if (item.icon) {
        var ico = document.createElement('i');
        ico.setAttribute('data-lucide', item.icon);
        ico.style.width = '16px';
        ico.style.height = '16px';

        btn.appendChild(document.createTextNode(' '));

      btn.appendChild(document.createTextNode(item.label || ''));
      menu.appendChild(btn);
    }
  });
  wrapper.appendChild(menu);

// ---- Panel resize (drag dividers) ----
(function initResizers() {
  var grid = document.querySelector('.pg-grid');
  var dividers = document.querySelectorAll('.pg-divider');
  var startX, startWidths, dividerIdx;

  dividers.forEach(function(div) {
    div.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startDrag(e.clientX, this);
    });
    div.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startDrag(e.touches[0].clientX, this);
    }, { passive: false });
  });

  function startDrag(clientX, divider) {
    startX = clientX;
    dividerIdx = divider.dataset.divider === '1' ? 0 : 1;
    divider.classList.add('pg-divider--dragging');
    var panels = grid.querySelectorAll('.pg-panel');
    startWidths = Array.from(panels).map(function(p) { return p.getBoundingClientRect().width; });
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onDrag, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  function onDrag(e) {
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var dx = clientX - startX;
    var totalW = grid.clientWidth - 12;
    var leftIdx = dividerIdx === 0 ? 0 : 1;
    var rightIdx = dividerIdx === 0 ? 1 : 2;
    var leftW = startWidths[leftIdx] + dx;
    var rightW = startWidths[rightIdx] - dx;
    var minW = 180;
    if (leftW < minW) { rightW -= (minW - leftW); leftW = minW; }
    if (rightW < minW) { leftW -= (minW - rightW); rightW = minW; }
    var pcts = startWidths.map(function(w) { return w / totalW; });
    pcts[leftIdx] = leftW / totalW;
    pcts[rightIdx] = rightW / totalW;
    grid.style.gridTemplateColumns = pcts.map(function(p) { return (p * 100).toFixed(1) + 'fr'; }).join(' 6px ');
  }

  function onEnd() {
    document.querySelectorAll('.pg-divider--dragging').forEach(function(d) { d.classList.remove('pg-divider--dragging'); });
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', onEnd);
    try { localStorage.setItem('pg-grid-cols', grid.style.gridTemplateColumns); } catch(e) {}
  }

  // Restore saved proportions
  try {
    var saved = localStorage.getItem('pg-grid-cols');
    if (saved) grid.style.gridTemplateColumns = saved;
  } catch(e) {}
})();

// ---- Mobile tab switching ----
document.querySelectorAll('.pg-bottom-tabs .db-bottom-nav__item').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.pg-bottom-tabs .db-bottom-nav__item').forEach(function(b) { b.classList.remove('db-bottom-nav__item--active'); });
    this.classList.add('db-bottom-nav__item--active');
    var panel = this.dataset.panel;
    document.querySelectorAll('.pg-panel').forEach(function(p) { p.classList.remove('pg-panel--active'); });
    document.getElementById('panel-' + panel).classList.add('pg-panel--active');
  });
});
