  <style>
    html, body { margin: 0; overflow-x: hidden; height: 100%; }

    /* Nav bar */
    .db-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--db-cream);
      border-bottom: 1px solid var(--db-sand);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      font-family: var(--db-font-ui);
      backdrop-filter: blur(8px);
    }
    .db-nav__brand {
      font-family: var(--db-font-heading);
      font-weight: 800;
      font-size: 1.125rem;
      color: var(--db-ink);
      text-decoration: none;
    }
    .db-nav__links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .db-nav__links a {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--db-charcoal);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--db-radius-2);
      transition: color var(--db-transition), background var(--db-transition);
    }
    .db-nav__links a:hover {
      color: var(--db-terracotta);
      background: color-mix(in srgb, var(--db-ink) 7%, transparent);
    }
    .db-nav__link--active {
      color: var(--db-terracotta) !important;
      background: color-mix(in srgb, var(--db-terracotta) 15%, transparent) !important;
    }
    .db-nav__github {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--db-charcoal);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--db-radius-2);
      border: 1px solid var(--db-sand);
      transition: border-color var(--db-transition);
    }
    .db-nav__github:hover { border-color: var(--db-charcoal); }
    @media (max-width: 600px) {
      .db-nav { padding: 0 12px; }
      .db-nav__links { gap: 2px; }
      .db-nav__links a { font-size: 0.75rem; padding: 4px 8px; }
      .db-nav__github span { display: none; }
    }

    /* Playground layout */
    .pg-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 48px);
    }
    .pg-grid {
      display: grid;
      grid-template-columns: 1fr 6px 1fr 6px 2fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .pg-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .pg-panel__toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--db-sand);
      background: var(--db-cream);
      font-family: var(--db-font-ui);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--db-charcoal);
      flex-shrink: 0;
    }
    .pg-panel__toolbar-title {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pg-panel__body {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }

    /* Dividers */
    .pg-divider {
      background: var(--db-sand);
      cursor: col-resize;
      position: relative;
      z-index: 10;
      transition: background 0.15s;
    }
    .pg-divider:hover,
    .pg-divider--dragging {
      background: var(--db-terracotta);
    }
    .pg-divider::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: -4px; right: -4px;
    }

    /* Override serif body font to UI font for tool interface */
    .pg-panel__body .db-field__input,
    .pg-panel__body .db-field__label,
    .pg-panel__body .db-field__helper,
    .pg-panel__body .db-select__input,
    .pg-panel__body .db-label {
      font-family: var(--db-font-ui);
    }

    /* Collapsible panels */
    .pg-panel--collapsed {
      overflow: hidden;
    }
    .pg-panel--collapsed .pg-panel__body,
    .pg-panel--collapsed .pg-panel__toolbar-title,
    .pg-panel--collapsed .pg-panel__toolbar > * {
      display: none !important;
    }
    .pg-panel--collapsed .pg-panel__toolbar {
      justify-content: center;
      padding: 8px 4px;
    }

    /* Chat panel */
    .pg-chat {
      display: flex;
      flex-direction: column;
      padding: 0 !important;
      overflow: hidden;
    }
    .pg-chat__messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pg-chat__empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      padding: 24px;
      color: var(--db-warm-gray);
    }
    .pg-chat__msg {
      max-width: 88%;
      padding: 8px 12px;
      border-radius: var(--db-radius-2);
      font-family: var(--db-font-ui);
      font-size: 0.8125rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .pg-chat__msg--user {
      align-self: flex-end;
      background: var(--db-terracotta);
      color: #fff;
    }
    .pg-chat__msg--ai {
      align-self: flex-start;
      background: var(--db-cream);
      border: 1px solid var(--db-sand);
      color: var(--db-ink);
    }
    .pg-chat__msg--streaming::after {
      content: '\25CF';
      animation: pg-blink 1s infinite;
      margin-left: 4px;
      font-size: 0.625rem;
      vertical-align: middle;
    }
    @keyframes pg-blink { 0%,100%{opacity:.2} 50%{opacity:1} }
    .pg-chat__msg--error {
      align-self: flex-start;
      background: color-mix(in srgb, var(--db-error, #d32f2f) 10%, transparent);
      border: 1px solid var(--db-error, #d32f2f);
      color: var(--db-error, #d32f2f);
    }
    .pg-chat__footer {
      flex-shrink: 0;
      border-top: 1px solid var(--db-sand);
      padding: 8px 12px;
      background: var(--db-cream);
    }
    .pg-chat__examples {
      margin-bottom: 6px;
    }
    .pg-chat--has-messages .pg-chat__examples,
    .pg-chat--has-messages .pg-chat__empty { display: none; }
    .pg-chat__input-row {
      position: relative;
    }
    .pg-chat__input-row .db-textarea {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      resize: none;
      font-family: var(--db-font-ui);
      font-size: 0.875rem;
      line-height: 1.5;
      padding: 10px 12px 24px 12px;
      box-sizing: border-box;
    }
    .pg-chat__input-row::after {
      content: '\23CE';
      position: absolute;
      right: 10px;
      bottom: 8px;
      font-size: 0.75rem;
      color: var(--db-warm-gray);
      opacity: 0.45;
      pointer-events: none;
      font-family: var(--db-font-ui);
    }
    .pg-chat__examples a:hover { color: var(--db-terracotta); }
    /* Theme picker — move to right bottom on playground */
    .db-theme-switcher { left: auto; right: var(--db-space-5); }
    .db-theme-switcher__popover { left: auto; right: 0; }

    /* JSON panel */
    .pg-json-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pg-json-area textarea {
      flex: 1;
      resize: none;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.75rem;
      line-height: 1.5;
      border: 1px solid var(--db-sand);
      border-radius: var(--db-radius-2);
      background: var(--db-cream-dark, var(--db-cream));
      color: var(--db-ink);
      padding: 12px;
      tab-size: 2;
    }
    .pg-json-area textarea:focus {
      outline: 2px solid var(--db-terracotta);
      outline-offset: -1px;
    }
    .pg-json-tree {
      flex: 1;
      overflow: auto;
      min-height: 0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      padding: 12px;
      border: 1px solid var(--db-sand);
      border-radius: var(--db-radius-2);
      background: var(--db-cream-dark, var(--db-cream));
      color: var(--db-ink);
    }
    .pg-json-tree .renderjson a { text-decoration: none; cursor: pointer; }
    .pg-json-tree .renderjson .disclosure { color: var(--db-terracotta); font-weight: 600; font-size: 0.8rem; padding: 0 2px; }
    .pg-json-tree .renderjson .string { color: #b5503c; }
    .pg-json-tree .renderjson .number { color: #3a7d6e; }
    .pg-json-tree .renderjson .boolean { color: #7c5cbf; }
    .pg-json-tree .renderjson .key { color: var(--db-ink); font-weight: 500; }
    .pg-json-tree .renderjson .keyword { color: var(--db-warm-gray); }
    .pg-json-tree .renderjson .syntax { color: var(--db-warm-gray); }
    .pg-json-error {
      display: none;
      margin-bottom: 8px;
    }

    /* Preview panel */
    .pg-preview {
      padding: 16px;
      min-height: 100%;
    }
    .pg-preview:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }
    .pg-preview:empty::after {
      content: '\201CThe details are not the details. They make the design.\201D\A\2014 Charles Eames';
      white-space: pre-wrap;
      text-align: center;
      font-family: var(--db-font-heading);
      font-size: 0.9375rem;
      font-style: italic;
      line-height: 1.6;
      color: var(--db-warm-gray);
      opacity: 0.6;
      max-width: 260px;
    }

    /* Bottom tab bar — uses DAUB db-bottom-nav, hidden on desktop */
    @media (min-width: 1025px) {
      .pg-bottom-tabs { display: none !important; }
    }
    @media (max-width: 1024px) {
      .pg-grid {
        display: flex;
        flex-direction: column;
      }
      .pg-divider { display: none; }
      .pg-panel { display: none; }
      .pg-panel--active { display: flex; flex: 1; }
      .pg-footer { display: none; }
      .pg-wrapper { padding-bottom: 56px; }
    }
  </style>
</head>
<body>

<nav class="db-nav">

<!-- Main playground -->
<div class="pg-wrapper">

  <div class="pg-grid">

    <!-- LEFT: Chat Panel -->
    <div class="pg-panel pg-panel--active" id="panel-prompt">
      <div class="pg-panel__toolbar">
        <span class="pg-panel__toolbar-title" id="pg-chat-title"><strong>Chat</strong></span>
        <span style="flex:1"></span>
        <button class="db-btn db-btn--ghost db-btn--sm" id="pg-new-chat" title="New Chat"><i data-lucide="plus" style="width:12px;height:12px;"></i> New Chat</button>
      </div>
      <div class="pg-panel__body pg-chat">

        <!-- Messages area -->
        <div class="pg-chat__messages" id="pg-chat-messages">
          <div class="pg-chat__empty" id="pg-chat-empty">
            <i data-lucide="sparkles" style="width:32px;height:32px;color:var(--db-terracotta);"></i>
            <h3 class="db-h4" style="margin:12px 0 4px;">What Would You Like to Build?</h3>
            <p class="db-caption db-text-muted">Describe a UI and watch it come to life with DAUB components.</p>
          </div>
        </div>

        <!-- Footer -->
        <div class="pg-chat__footer">
          <div class="pg-chat__examples" id="pg-chat-examples">
            <div class="db-collapsible">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <button class="db-collapsible__trigger" aria-expanded="false" style="font-size:0.6875rem;padding:4px 0;color:var(--db-warm-gray);">
                  <svg class="db-collapsible__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><path d="m9 18 6-6-6-6"/></svg>
                  Examples
                </button>
                <small><a href="#" id="pg-byok-link" style="color:var(--db-warm-gray);text-decoration:none;font-size:0.6875rem;font-family:var(--db-font-ui);">Use Your Own Key</a></small>
              </div>
              <div class="db-collapsible__content">
                <div style="display:flex;flex-wrap:wrap;gap:4px;padding-top:4px;">
                  <button class="db-chip db-chip--sm" data-example="Analytics dashboard with a top stats row showing 4 StatCards for revenue, active users, orders, and conversion rate. Below that a two-column layout: left side has a large ChartCard with a line chart of monthly revenue over 12 months, right side has a Card with a sortable DataTable of recent orders showing order ID, customer name, amount, status badge, and date. Add a Breadcrumb at the top and a Pagination bar at the bottom.">Dashboard</button>
                  <button class="db-chip db-chip--sm" data-example="Login page with a centered Card on a subtle background. Inside the card: app logo at top, heading 'Welcome Back', email and password TextInput fields with proper labels and placeholders, a 'Remember me' Checkbox, a primary 'Sign In' Button full-width, a Divider with 'or continue with' text, then a row of 3 ghost Buttons for Google, GitHub, and Apple sign-in. Below the card a small caption: 'Don't have an account? Sign up'.">Login</button>
                  <button class="db-chip db-chip--sm" data-example="Settings page with a vertical Layout. At the top a heading 'App Settings' with a caption subtitle. Below that a Tabs component with 4 tabs: General, Notifications, Appearance, Security. The General tab content shows a Card with form fields: TextInput for display name, TextInput for email, Textarea for bio, a Select dropdown for language, and a Toggle for 'Public profile'. Footer row with secondary 'Cancel' and primary 'Save Changes' Buttons.">Settings</button>
                  <button class="db-chip db-chip--sm" data-example="User profile page with a horizontal two-column layout. Left column (narrow): a Card containing a large Avatar, the user's name as a heading, their role as a caption, a list of stats (posts, followers, following) as Badges, and an 'Edit Profile' Button. Right column (wide): a Card with Tabs for 'Posts', 'Activity', and 'About'. The Posts tab shows a List of 5 items each with a title, date caption, and a short excerpt paragraph.">Profile</button>
                  <button class="db-chip db-chip--sm" data-example="Team members directory with a heading 'Team Directory', a SearchInput with placeholder 'Search by name or role', and a Card containing a DataTable with columns: avatar + name, email, role (shown as a Chip), department, join date, and a status Badge (active/away/offline). Show 8 rows of realistic team member data. Below the table a Pagination with page numbers. Add a primary 'Invite Member' Button in the top right corner.">Table</button>
                  <button class="db-chip db-chip--sm" data-example="Pricing page with a centered heading 'Choose Your Plan' and a subtitle caption. Below that a Toggle group to switch between Monthly and Annual billing. Then a 3-column horizontal layout of Cards: Starter ($9/mo), Professional ($29/mo, highlighted with a 'Popular' Badge), and Enterprise ($99/mo). Each card has the plan name, price, a list of 5-6 features with checkmark icons, and a full-width Button (ghost for Starter, primary for Professional, secondary for Enterprise). Professional card should have a subtle raised surface style.">Pricing</button>
                </div>
              </div>
            </div>
          </div>
          <div class="pg-chat__input-row">
            <textarea class="db-textarea" id="pg-prompt" rows="1" placeholder="Describe the UI you want to build..."></textarea>
          </div>
          <span class="db-caption db-text-muted" id="pg-status" style="display:block;margin-top:4px;font-family:var(--db-font-ui);"></span>
        </div>
      </div>
    </div>

    <!-- Divider 1 -->
    <div class="pg-divider" data-divider="1"></div>

    <!-- MIDDLE: JSON Panel -->
    <div class="pg-panel" id="panel-json">
      <div class="pg-panel__toolbar">
        <span class="pg-panel__toolbar-title"><strong>Structure</strong></span>
        <button class="db-btn db-btn--ghost db-btn--sm" id="pg-render" title="Render" style="display:none;"><i data-lucide="play" style="width:12px;height:12px;"></i></button>
        <button class="db-btn db-btn--ghost db-btn--sm" id="pg-copy-json" title="Copy JSON"><i data-lucide="copy" style="width:12px;height:12px;"></i></button>

<div class="db-modal-overlay" id="pg-byok-modal">
  <div class="db-modal" data-db-texture="glass" style="max-width:380px;">
    <div class="db-modal__header">
      <div class="db-modal__title">Use Your Own Key</div>
      <button class="db-modal__close" id="pg-byok-modal-close">&times;</button>
    </div>
    <div class="db-modal__body">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="db-field">
          <label class="db-field__label">Provider</label>
          <div class="db-select">
            <select class="db-select__input" id="pg-provider">

// ---- Streaming SSE helper ----
function streamFetch(url, headers, body, onChunk, onDone, onError) {
  if (typeof ReadableStream === 'undefined') { onError('no-stream'); return; }
  fetch(url, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(body)
  }).then(function(res) {
    if (!res.ok) {
      return res.json().catch(function() { return {}; }).then(function(err) {
        throw new Error((err.error && err.error.message) || 'HTTP ' + res.status);
      });
    }
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';
    var doneOnce = false;
    function pump() {
      reader.read().then(function(result) {
        if (doneOnce) return;
        if (result.done) { doneOnce = true; onDone(); return; }
        buf += decoder.decode(result.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.startsWith(':')) continue;
          if (line === 'data: [DONE]') { doneOnce = true; onDone(); return; }
          if (line.startsWith('data: ')) {
            try { onChunk(JSON.parse(line.slice(6))); } catch (e) {}
          } else if (line.startsWith('event: ')) {
            // store event type for next data line (Anthropic)
            buf = 'event:' + line.slice(7) + '\n' + buf;
          }
        }
        pump();
      }).catch(function(err) { if (!doneOnce) { doneOnce = true; onError(err); } });
    }
    pump();
  }).catch(function(err) { onError(err); });
}

// ---- JSON cleanup helper ----
function cleanJSON(text) {
  var s = text.trim();
  // Strip markdown fences
  s = s.replace(/^```(?:json|JSON)?\s*\n?/, '').replace(/\n?```\s*$/, '');
  s = s.trim();
  // Extract outermost {...}
  var start = s.indexOf('{');
  var end = s.lastIndexOf('}');
  if (start !== -1 && end > start) s = s.substring(start, end + 1);
  // Remove JS-style comments (preserve strings containing // or /*)
  s = s.replace(/"(?:[^"\\]|\\.)*"|\/\/[^\n]*|\/\*[\s\S]*?\*\//g, function(m) {
    return m[0] === '"' ? m : '';
  });
  // Fix trailing commas before } or ]
  s = s.replace(/,\s*([}\]])/g, '$1');
  return s;
}

// ---- Repair truncated JSON (force-close open brackets) ----
function repairJSON(s) {
  // Strip trailing commas
  s = s.replace(/,\s*$/, '');
  // Walk string tracking open brackets
  var stack = [], inStr = false, esc = false;
  for (var i = 0; i < s.length; i++) {
    var ch = s[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') stack.push('}');
    else if (ch === '[') stack.push(']');
    else if (ch === '}' || ch === ']') stack.pop();
  }
  // If inside a string, truncate back to before last open quote
  if (inStr) {
    var qi = s.lastIndexOf('"');
    while (qi > 0 && s[qi - 1] === '\\') qi = s.lastIndexOf('"', qi - 1);
    if (qi > 0) s = s.substring(0, qi + 1);
    stack = []; inStr = false; esc = false;
    for (var j = 0; j < s.length; j++) {
      var c2 = s[j];
      if (esc) { esc = false; continue; }
      if (c2 === '\\') { esc = true; continue; }
      if (c2 === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c2 === '{') stack.push('}');
      else if (c2 === '[') stack.push(']');
      else if (c2 === '}' || c2 === ']') stack.pop();
    }
  }
  // Remove trailing comma and close all brackets
  s = s.replace(/,\s*$/, '');
  var closers = '';
  for (var k = stack.length - 1; k >= 0; k--) closers += stack[k];
  try { return JSON.parse(s + closers); } catch (e) { return null; }
}

// ---- Progressive rendering (force-close incomplete JSON) ----
function tryProgressiveRender(text) {
  var s = cleanJSON(text);
  if (!s || s.length < 20) return;

  var stack = [];
  var inStr = false, esc = false;

  for (var i = 0; i < s.length; i++) {
    var ch = s[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') { stack.push('}'); continue; }
    if (ch === '[') { stack.push(']'); continue; }
    if (ch === '}' || ch === ']') { stack.pop(); continue; }
  }

  // If still inside a string, truncate to before the opening quote
  if (inStr) {
    var qi = s.lastIndexOf('"', s.length - 1);
    while (qi > 0 && s[qi - 1] === '\\') qi = s.lastIndexOf('"', qi - 1);
    if (qi > 0) s = s.substring(0, qi + 1);
    stack = []; inStr = false; esc = false;
    for (var j = 0; j < s.length; j++) {
      var c2 = s[j];
      if (esc) { esc = false; continue; }
      if (c2 === '\\') { esc = true; continue; }
      if (c2 === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c2 === '{') stack.push('}');
      else if (c2 === '[') stack.push(']');
      else if (c2 === '}' || c2 === ']') stack.pop();
    }
  }

  var trimmed = s.replace(/,\s*$/, '');
  var closers = '';
  for (var k = stack.length - 1; k >= 0; k--) closers += stack[k];

  try {
    var spec = JSON.parse(trimmed + closers);
    if (spec && spec.root && spec.elements) {
      renderSpec(spec);
      $status.textContent = 'Rendering\u2026';
    }
  } catch (e) {}
}

// ---- Chat message helpers ----
function buildMessages(userPrompt) {
  var msgs = [{ role: 'system', content: SYSTEM_PROMPT }];
  if (currentSpec) {
    msgs.push({ role: 'user', content: '(previous request)' });
    msgs.push({ role: 'assistant', content: JSON.stringify(currentSpec) });
    userPrompt = userPrompt + '\n\nModify the existing spec above. Return the COMPLETE updated spec.';
  }
  msgs.push({ role: 'user', content: userPrompt });
  return msgs;
}

function addChatBubble(role, text) {

  });

function countComponents(spec) {
  if (!spec || !spec.elements) return 0;
  return Object.keys(spec.elements).length;
}
function listComponentTypes(spec) {
  if (!spec || !spec.elements) return [];
  var counts = {};
  Object.keys(spec.elements).forEach(function(id) {
    var t = spec.elements[id].type || 'unknown';
    counts[t] = (counts[t] || 0) + 1;
  });
  return Object.keys(counts).sort().map(function(t) { return t + ' \u00d7' + counts[t]; });
}
function buildResultBubble(bubble, spec) {
  var n = countComponents(spec);
  var types = listComponentTypes(spec);
  while (bubble.firstChild) bubble.removeChild(bubble.firstChild);
  bubble.style.cursor = 'pointer';
  var summary = document.createElement('span');
  summary.textContent = 'Generated UI \u00B7 ' + n + ' components';
  bubble.appendChild(summary);
  var detail = document.createElement('div');
  detail.style.cssText = 'margin-top:6px;font-size:0.75rem;color:var(--db-warm-gray);display:none;';
  types.forEach(function(t) {
    var chip = document.createElement('span');
    chip.className = 'db-chip db-chip--sm';
    chip.style.marginRight = '4px';
    chip.style.marginBottom = '4px';
    chip.textContent = t;
    detail.appendChild(chip);
  });
  bubble.appendChild(detail);
  bubble.onclick = function() {
    detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
  };
}

// ---- Blocking fallback ----
function runBlockingGenerate(messages, streamBubble) {
  var provider = isDefaultMode ? 'default' : ($provider ? $provider.value : 'openai');
  var apiCall;
  if (isDefaultMode) {
    apiCall = fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages })
    }).then(function(res) {
      if (!res.ok) return res.json().catch(function() { return {}; }).then(function(err) { throw new Error((err.error && err.error.message) || 'HTTP ' + res.status); });
      return res.json();
    }).then(function(data) { return data.choices[0].message.content; });
  } else {
    apiCall = provider === 'anthropic' ? callAnthropic(messages) : provider === 'openrouter' ? callOpenRouter(messages) : callOpenAI(messages);
  }
  apiCall.then(function(raw) {
    raw = cleanJSON(raw);
    var spec;
    try { spec = JSON.parse(raw); } catch(e) { spec = repairJSON(raw); }
    if (!spec || !spec.root || !spec.elements) throw new Error('Invalid or incomplete JSON response');
    $json.value = JSON.stringify(spec, null, 2);
    $status.textContent = '';
    currentSpec = spec;
    renderSpec(spec);
    refreshJsonTree();
    if (streamBubble) {
      streamBubble.classList.remove('pg-chat__msg--streaming');
      buildResultBubble(streamBubble, spec);
    }
    chatHistory.push({ role: 'assistant', content: 'Generated UI \u00B7 ' + countComponents(spec) + ' components' });
    saveChatState();
  }).catch(function(err) {
    $status.textContent = '';
    showJsonError(err.message);
    if (streamBubble) {
      streamBubble.classList.remove('pg-chat__msg--streaming');
      streamBubble.className = 'pg-chat__msg pg-chat__msg--error';
      streamBubble.textContent = err.message;
    }
  }).finally(function() {
    setLoading(false);
  });
}

function generate() {
  var prompt = $prompt.value.trim();
  if (!prompt) return;

  if (!isDefaultMode) {
    var key = $apikey ? $apikey.value.trim() : '';
    if (!key) {
      showJsonError('Please add your API key in the settings below.');
      return;
    }
  }

  // Add user bubble
  chatHistory.push({ role: 'user', content: prompt });
  addChatBubble('user', prompt);
  updateChatState();
  $prompt.value = '';
  $prompt.style.height = '';

  // Add streaming indicator bubble
  var streamBubble = addChatBubble('ai', '');
  streamBubble.classList.add('pg-chat__msg--streaming');

  saveSettings();
  setLoading(true);
  $status.textContent = 'Streaming\u2026';
  hideJsonError();
  $json.value = '';
  updateRenderVisibility();
  while ($preview.firstChild) $preview.removeChild($preview.firstChild);

  var messages = buildMessages(prompt);
  var accumulated = '';
  var continuations = 0;
  var MAX_CONTINUATIONS = 2;
  var retries = 0;
  var MAX_RETRIES = 3;
  var usingFallback = false;
  var renderTimer = setInterval(function() { tryProgressiveRender(accumulated); }, 300);

  var streamFn;
  var provider;
  if (isDefaultMode) {
    streamFn = streamDefault;
  } else {
    provider = $provider ? $provider.value : 'openai';
    streamFn = provider === 'anthropic' ? streamAnthropic : provider === 'openrouter' ? streamOpenRouter : streamOpenAI;
  }

  function doRetryOrFallback(reason) {
    retries++;
    accumulated = '';
    $json.value = '';
    if (retries <= MAX_RETRIES) {
      $status.textContent = 'Retry ' + retries + '/' + MAX_RETRIES + ' \u2014 ' + reason;
      setTimeout(function() { startStream(messages); }, 500);
    } else if (isDefaultMode && !usingFallback) {
      usingFallback = true;
      retries = 0;
      $status.textContent = 'Switching to fallback model\u2026';
      setTimeout(function() { startStream(messages, FALLBACK_MODEL); }, 500);
    } else {
      clearInterval(renderTimer);
      $status.textContent = '';
      showJsonError(reason);
      streamBubble.classList.remove('pg-chat__msg--streaming');
      streamBubble.className = 'pg-chat__msg pg-chat__msg--error';
      streamBubble.textContent = 'Parse error \u2014 ' + reason;
      setLoading(false);
    }
  }

  function startStream(msgs, model) {
    var callStreamFn = function(m, onT, onD, onE) {
      if (isDefaultMode) streamDefault(m, onT, onD, onE, model);
      else streamFn(m, onT, onD, onE);
    };
    callStreamFn(msgs,
      function onText(chunk) {
        accumulated += chunk;
        $json.value = accumulated;
        $json.scrollTop = $json.scrollHeight;
      },
      function onDone() {
        // Auto-continue if response was truncated (finish_reason: "length")
        if (_lastFinishReason === 'length' && continuations < MAX_CONTINUATIONS) {
          continuations++;
          $status.textContent = 'Continuing (' + continuations + '/' + MAX_CONTINUATIONS + ')\u2026';
          var contMsgs = msgs.concat([
            { role: 'assistant', content: accumulated },
            { role: 'user', content: 'Continue the JSON exactly from where you stopped. Output ONLY the remaining JSON, no repetition, no explanation.' }
          ]);
          startStream(contMsgs, model);
          return;
        }
        clearInterval(renderTimer);
        var clean = cleanJSON(accumulated);
        var spec;
        try {
          spec = JSON.parse(clean);
        } catch (e1) {
          spec = repairJSON(clean);
        }
        if (spec && spec.root && spec.elements) {
          $json.value = JSON.stringify(spec, null, 2);
          $status.textContent = usingFallback ? 'Rendered via fallback model' : '';
          currentSpec = spec;
          renderSpec(spec);
          refreshJsonTree();
          streamBubble.classList.remove('pg-chat__msg--streaming');
          buildResultBubble(streamBubble, spec);
          chatHistory.push({ role: 'assistant', content: 'Generated UI \u00B7 ' + countComponents(spec) + ' components' });
          saveChatState();
          setLoading(false);
        } else {
          doRetryOrFallback('Invalid or incomplete JSON response');
        }
      },
      function onError(err) {
        clearInterval(renderTimer);
        if (err === 'no-stream') {
          runBlockingGenerate(messages, streamBubble);
          return;
        }
        doRetryOrFallback(err.message || String(err));
      }
    );
  }
  startStream(messages);
}

// ============================================================
//  RENDERER — json-render spec to DAUB HTML
// ============================================================
var MAX_DEPTH = 20;

function renderSpec(spec) {
  if (!spec || !spec.root || !spec.elements) {
    showJsonError('Spec must have "root" and "elements"');
    return;
  }
  $preview.textContent = '';
  var el = renderElement(spec.elements, spec.root, 0);
  if (el) $preview.appendChild(el);

  // Re-init DAUB behaviors on new content
  if (window.DAUB) {
    DAUB.init($preview);
    if (DAUB.fixNestedRadius) DAUB.fixNestedRadius($preview);
  }
  if (window.lucide) lucide.createIcons({ nodes: $preview.querySelectorAll('[data-lucide]') });
}

function renderElement(elements, id, depth) {
  if (depth > MAX_DEPTH) return document.createTextNode('[max depth]');
  var def = elements[id];
  if (!def) return null;

  var render = RENDERERS[def.type];
  if (!render) {
    var el = document.createElement('div');
    el.className = 'db-alert db-alert--warning';
    var content = document.createElement('div');
    content.className = 'db-alert__content';
    var title = document.createElement('div');
    title.className = 'db-alert__title';
    title.textContent = 'Unknown: ' + def.type;
    content.appendChild(title);
    el.appendChild(content);
    return el;
  }

  var children = def.children || (def.props && def.props.children) || [];
  return render(def.props || {}, children, elements, depth);
}

function renderChildren(elements, childIds, depth) {
  var frag = document.createDocumentFragment();
  (childIds || []).forEach(function(id) {
    var el = renderElement(elements, id, depth + 1);
    if (el) frag.appendChild(el);
  });
  return frag;
}

// Safe HTML-entity escaping via textContent
function esc(s) {
  if (s == null) return '';
  var d = document.createElement('span');
  d.textContent = String(s);
  return d.innerHTML;
}

// Sanitize HTML: allowlisted tags/attrs, strip event handlers & javascript: URIs
var _sanitizeTags = 'p,strong,em,b,i,u,br,a,ul,ol,li,h1,h2,h3,h4,h5,h6,blockquote,pre,code,span,div,hr,mark,small,del,table,thead,tbody,tr,th,td,img'.split(',');
var _sanitizeAttrs = { a: ['href','title'], img: ['src','alt','width','height'], td: ['colspan','rowspan'], th: ['colspan','rowspan'], ol: ['start','type'], '*': ['class'] };
function sanitizeHtml(html) {
  if (!html) return '';
  var doc = new DOMParser().parseFromString(html, 'text/html');
  function walk(node) {
    var out = '';
    for (var i = 0; i < node.childNodes.length; i++) {
      var n = node.childNodes[i];
      if (n.nodeType === 3) { out += esc(n.textContent); continue; }
      if (n.nodeType !== 1) continue;
      var tag = n.tagName.toLowerCase();
      if (_sanitizeTags.indexOf(tag) < 0) { out += walk(n); continue; }
      var allowed = (_sanitizeAttrs[tag] || []).concat(_sanitizeAttrs['*'] || []);
      var attrs = '';
      for (var j = 0; j < n.attributes.length; j++) {
        var a = n.attributes[j], aname = a.name.toLowerCase();
        if (aname.indexOf('on') === 0) continue;
        if (allowed.indexOf(aname) < 0) continue;
        var v = a.value;
        if ((aname === 'href' || aname === 'src') && /^\s*javascript:/i.test(v)) continue;
        attrs += ' ' + aname + '="' + esc(v) + '"';
      }
      if (tag === 'a') attrs += ' rel="noopener" target="_blank"';
      if (tag === 'br' || tag === 'hr' || tag === 'img') { out += '<' + tag + attrs + '>'; }
      else { out += '<' + tag + attrs + '>' + walk(n) + '</' + tag + '>'; }
    }
    return out;
  }
  return walk(doc.body);
}

function iconHtml(name, size) {
  if (!name) return '';
  return '<i data-lucide="' + esc(name) + '" style="width:' + (size||16) + 'px;height:' + (size||16) + 'px;"></i>';
}

// Helper: create element and set safe text/attributes
function mkEl(tag, cls, text) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text != null) el.textContent = text;
  return el;
}

// ---- Component Renderers (67 types) ----
var RENDERERS = {};

// -- Layout --
RENDERERS.Layout = function(p, ch, els, d) {
  var el = document.createElement('div');
  if (p.container) {
    el.className = 'db-container' + (p.container === 'wide' ? ' db-container--wide' : p.container === 'narrow' ? ' db-container--narrow' : '');
  }
  if (p.columns) {
    el.classList.add('db-grid', 'db-grid--' + p.columns);
    if (p.gap) el.classList.add('db-gap-' + Math.max(1, Math.min(6, p.gap)));
  } else if (p.direction === 'horizontal') {
    el.style.display = 'flex';
    el.style.flexDirection = 'row';
    el.style.gap = 'var(--db-space-' + Math.max(0, Math.min(6, p.gap || 2)) + ')';
    el.style.flexWrap = 'wrap';
    el.style.alignItems = 'flex-start';
  } else {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.gap = 'var(--db-space-' + Math.max(0, Math.min(6, p.gap || 2)) + ')';
  }
  el.appendChild(renderChildren(els, ch, d));
  return el;
};

};

  var classMap = { h1:'db-h1', h2:'db-h2', h3:'db-h3', h4:'db-h4', p:'db-body', span:'' };
  el.className = (classMap[tag] || '') + (p.class ? ' ' + p.class : '');

};

RENDERERS.CustomSelect = function(p) {

  trigger.type = 'button';

  var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'm6 9 6 6 6-6');
  svg.appendChild(path);
  trigger.appendChild(svg);
  el.appendChild(trigger);
  var dd = mkEl('div', 'db-custom-select__dropdown');

// -- Tabs --
RENDERERS.Tabs = function(p, ch, els, d) {
  var el = mkEl('div', 'db-tabs');
  var list = mkEl('div', 'db-tabs__list');
  list.setAttribute('role', 'tablist');
  var tabs = p.tabs || [];
  tabs.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'db-tabs__tab';
    if (t.id === p.active) btn.setAttribute('aria-selected', 'true');
    btn.textContent = t.label || '';
    list.appendChild(btn);
  });
  el.appendChild(list);
  if (ch.length) {
    ch.forEach(function(cid, i) {
      var panel = mkEl('div', 'db-tabs__panel');
      if (i > 0) panel.hidden = true;
      panel.appendChild(renderElement(els, cid, d + 1));
      el.appendChild(panel);
    });
  } else {
    tabs.forEach(function(t, i) {
      var panel = mkEl('div', 'db-tabs__panel');
      if (i > 0) panel.hidden = true;
      panel.appendChild(mkEl('p', 'db-body', (t.label || '') + ' content'));
      el.appendChild(panel);

// -- Breadcrumbs --
RENDERERS.Breadcrumbs = function(p) {
  var el = document.createElement('nav');
  el.className = 'db-breadcrumbs';
  el.setAttribute('aria-label', 'Breadcrumb');
  var ol = document.createElement('ol');
  var items = p.items || [];
  items.forEach(function(item, i) {
    var li = document.createElement('li');
    if (i === items.length - 1) {
      li.setAttribute('aria-current', 'page');
      li.textContent = item.label || '';
    } else {
      var a = document.createElement('a');
      a.href = item.href || '#';
      a.textContent = item.label || '';
      li.appendChild(a);
    }
    ol.appendChild(li);
  });
  el.appendChild(ol);
  return el;
};

// -- Pagination --
RENDERERS.Pagination = function(p) {
  var el = document.createElement('nav');
  el.className = 'db-pagination';
  el.setAttribute('aria-label', 'Pagination');
  var total = Math.ceil((p.total || 1) / (p.perPage || 10));
  var cur = p.current || 1;
  var prev = document.createElement('button');
  prev.className = 'db-pagination__btn';
  prev.textContent = '\u00AB';
  if (cur <= 1) prev.disabled = true;
  el.appendChild(prev);
  for (var i = 1; i <= Math.min(total, 5); i++) {
    var btn = document.createElement('button');
    btn.className = 'db-pagination__btn';
    btn.textContent = String(i);
    if (i === cur) btn.setAttribute('aria-current', 'page');
    el.appendChild(btn);
  }
  if (total > 5) {
    el.appendChild(mkEl('span', 'db-pagination__ellipsis', '...'));
    var last = document.createElement('button');
    last.className = 'db-pagination__btn';
    last.textContent = String(total);
    el.appendChild(last);
  }
  var next = document.createElement('button');
  next.className = 'db-pagination__btn';
  next.textContent = '\u00BB';
  if (cur >= total) next.disabled = true;
  el.appendChild(next);
  return el;
};

// -- Table --
RENDERERS.Table = function(p) {
  var el = document.createElement('table');
  el.className = 'db-table';
  var cols = p.columns || [];
  var rows = p.rows || [];
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  cols.forEach(function(c) {
    var th = document.createElement('th');
    if (p.sortable) th.setAttribute('data-db-sort', '');
    if (c.numeric) th.className = 'db-numeric';
    th.textContent = c.label || '';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  el.appendChild(thead);
  var tbody = document.createElement('tbody');
  rows.forEach(function(r) {
    var tr = document.createElement('tr');
    cols.forEach(function(c) {
      var td = document.createElement('td');
      if (c.numeric) td.className = 'db-numeric';
      td.textContent = r[c.key] || '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  el.appendChild(tbody);
  return el;
};

// -- DataTable --
RENDERERS.DataTable = function(p) {
  var el = document.createElement('table');
  el.className = 'db-data-table';
  var cols = p.columns || [];
  var rows = p.rows || [];
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  if (p.selectable) {
    var thChk = document.createElement('th');
    var chk = document.createElement('input');
    chk.className = 'db-data-table__check';
    chk.type = 'checkbox';
    thChk.appendChild(chk);
    headRow.appendChild(thChk);
  }
  cols.forEach(function(c) {
    var th = document.createElement('th');
    th.setAttribute('data-sortable', '');
    th.textContent = c.label || '';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  el.appendChild(thead);
  var tbody = document.createElement('tbody');
  rows.forEach(function(r) {
    var tr = document.createElement('tr');
    if (p.selectable) {
      var tdChk = document.createElement('td');
      var chk2 = document.createElement('input');
      chk2.className = 'db-data-table__check';
      chk2.type = 'checkbox';
      tdChk.appendChild(chk2);
      tr.appendChild(tdChk);
    }
    cols.forEach(function(c) {
      var td = document.createElement('td');
      var raw = r[c.key];
      // Flatten object cell values (e.g. Badge specs) to string
      var val = (raw && typeof raw === 'object') ? (raw.label || raw.text || raw.content || raw.value || '') : (raw || '');
      // Auto-detect status badges
      if (/^(active|completed|shipped|approved|paid|live|verified|published|resolved)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--new', val));
      } else if (/^(pending|review|processing|in progress|draft|scheduled|new|open)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--updated', val));
      } else if (/^(error|failed|rejected|cancelled|canceled|blocked|expired)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--error', val));
      } else if (/^(on leave|away|inactive|paused|remote|archived|suspended|overdue|closed)$/i.test(val)) {
        td.appendChild(mkEl('span', 'db-badge db-badge--warning', val));
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  el.appendChild(tbody);
  return el;
};

// -- Calendar --
RENDERERS.Calendar = function(p) {
  var el = mkEl('div', 'db-calendar');
  var today = parseInt(p.today) || new Date().getDate();
  var sel = parseInt(p.selected) || 15;
  var hdr = mkEl('div', 'db-calendar__header');
  var prevBtn = document.createElement('button');
  prevBtn.className = 'db-calendar__nav';
  prevBtn.textContent = '\u2039';
  hdr.appendChild(prevBtn);
  hdr.appendChild(mkEl('span', 'db-calendar__title', 'March 2026'));
  var nextBtn = document.createElement('button');
  nextBtn.className = 'db-calendar__nav';
  nextBtn.textContent = '\u203A';
  hdr.appendChild(nextBtn);
  el.appendChild(hdr);
  var grid = mkEl('div', 'db-calendar__grid');
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d) {
    grid.appendChild(mkEl('span', 'db-calendar__day-label', d));
  });
  for (var i = 1; i <= 31; i++) {
    var day = document.createElement('button');
    day.className = 'db-calendar__day';
    if (i === today) day.classList.add('db-calendar__day--today');
    if (i === sel) day.classList.add('db-calendar__day--selected');
    day.textContent = String(i);
    grid.appendChild(day);
  }
  el.appendChild(grid);
  return el;
};

// -- Chart --
RENDERERS.Chart = function(p) {
  var wrap = document.createElement('div');
  var bars = p.bars || [];
  var maxVal = Math.max.apply(null, bars.map(function(b) { return b.max || b.value || 100; }));
  if (maxVal <= 0) maxVal = 100;
  var chart = mkEl('div', 'db-chart');
  bars.forEach(function(b) {
    var bar = mkEl('div', 'db-chart__bar');
    bar.style.height = Math.round(((b.value || 0) / maxVal) * 100) + '%';
    bar.title = (b.label || '') + ': ' + (b.value || 0);
    chart.appendChild(bar);
  });
  wrap.appendChild(chart);
  var labels = mkEl('div', 'db-chart__labels');
  bars.forEach(function(b) {
    labels.appendChild(mkEl('span', null, b.label || ''));
  });
  wrap.appendChild(labels);
  return wrap;
};

RENDERERS.AlertDialog = function(p, ch, els, d) {

  var sections = '';

// ---- Panel resize (drag dividers) ----
(function initResizers() {
  var grid = document.querySelector('.pg-grid');
  var dividers = document.querySelectorAll('.pg-divider');
  var startX, startWidths, dividerIdx;

  dividers.forEach(function(div) {
    div.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startDrag(e.clientX, this);
    });
    div.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startDrag(e.touches[0].clientX, this);
    }, { passive: false });
  });

  function startDrag(clientX, divider) {
    startX = clientX;
    dividerIdx = divider.dataset.divider === '1' ? 0 : 1;
    divider.classList.add('pg-divider--dragging');
    var panels = grid.querySelectorAll('.pg-panel');
    startWidths = Array.from(panels).map(function(p) { return p.getBoundingClientRect().width; });
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onDrag, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  function onDrag(e) {
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var dx = clientX - startX;
    var totalW = grid.clientWidth - 12;
    var leftIdx = dividerIdx === 0 ? 0 : 1;
    var rightIdx = dividerIdx === 0 ? 1 : 2;
    var leftW = startWidths[leftIdx] + dx;
    var rightW = startWidths[rightIdx] - dx;
    var minW = 180;
    if (leftW < minW) { rightW -= (minW - leftW); leftW = minW; }
    if (rightW < minW) { leftW -= (minW - rightW); rightW = minW; }
    var pcts = startWidths.map(function(w) { return w / totalW; });
    pcts[leftIdx] = leftW / totalW;
    pcts[rightIdx] = rightW / totalW;
    grid.style.gridTemplateColumns = pcts.map(function(p) { return (p * 100).toFixed(1) + 'fr'; }).join(' 6px ');
  }

  function onEnd() {
    document.querySelectorAll('.pg-divider--dragging').forEach(function(d) { d.classList.remove('pg-divider--dragging'); });
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', onEnd);
    try { localStorage.setItem('pg-grid-cols', grid.style.gridTemplateColumns); } catch(e) {}
  }

  // Restore saved proportions
  try {
    var saved = localStorage.getItem('pg-grid-cols');
    if (saved) grid.style.gridTemplateColumns = saved;
  } catch(e) {}
})();

  try {
    $json.value = JSON.stringify(currentSpec, null, 2);
    renderSpec(currentSpec);
    refreshJsonTree();
  } catch(e) {}
}
// Apply BYOK mode
if (!isDefaultMode) {
  $byokLink.textContent = '';
}
updateChatTitle();

// Auto-fill from URL param (e.g. ?prompt=...)
var urlParams = new URLSearchParams(window.location.search);
var presetPrompt = urlParams.get('prompt');
if (presetPrompt) {
  $prompt.value = presetPrompt;
  window.history.replaceState({}, '', window.location.pathname);
  setTimeout(function(){ generate(); }, 500);
}

})();
</script>

</body>
</html>
